# 手动触发：在 Release 下运行 BenchmarkDotNet（耗时较长，默认不随 PR 运行）。
# 结果与报告位于 BenchmarkDotNet.Artifacts（工作目录为 benchmark 项目文件夹）。
name: benchmarks

on:
  workflow_dispatch:

jobs:
  run-benchmarks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run benchmarks (Dry)
        working-directory: benchmark/ExtenderApp.Buffer.Benchmarks
        run: dotnet run -c Release -- --job Dry

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark/ExtenderApp.Buffer.Benchmarks/BenchmarkDotNet.Artifacts/results/
